# CloudPanel — Vhost Custom → apiinspecaoiadvh.org.br
# Sirva uploads de fotos diretamente pelo Nginx (recomendado).
# Ajuste o caminho se o site não estiver em htdocs/apiinspecaoiadvh.org.br/backend

location /media/ {
    alias /home/cloudpanel/htdocs/apiinspecaoiadvh.org.br/backend/uploads/;
    expires 7d;
    add_header Cache-Control "public";
    access_log off;
}
